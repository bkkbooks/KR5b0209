front:
  text: 玉籙濟幽判斛儀率八
  hash: sha256:2da6b61b5f817b3f87f340dc3672619017684bc01f254e76c0b6c34a2e593865
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0209_HFL_000-001a, image: hfl/0269/0269-126.png}
body:
  text: 法事具位臣禁等謹同誠上啓三清三境天尊十極十華上聖東極宫中慈悲太乙救苦天尊青玄上帝諸天天尊諸天天帝大羅法界無上眞仙三界萬靈一切眞宰恭望天慈洞回昭鑒通意伏以一炁盈虚萬形出没死復生而生復死人爲鬼而鬼爲人輪轉無窮報償不息悲莫悲於六道苦猶苦於四生蓋積善者徑陟善階積惡者終歸惡道頼我道祖太上慈尊廣立齋科普敷濟拔大啓超昇之㑹特垂拯救之文當隂𢡖陽舒之際乃神交鬼聚之時魂氣動而悲風生靈響發而隂霧靄洪音一舉黒壤遥聞仰惟紫極玄尊青華教父指明星爲慧炬廣運照臨凝梵炁作法橋大垂拯濟追魂使者吿召十方所屬地祇招延催促當願天仙道神祇道人倫道地獄道餓鬼道畜生道孳生物命魚鱉昆蟲不瞬息間遍髙深而普吿由斯須頃周遐邇以咸知自然意感誠孚翕爾影隨響答呼群率衆聲相應氣相求出死入生眇能視跛能履無遮無礙源源而來或後或先徐徐而至使者運招徠之力魂𠔃承攝召之功所有淨酆都開業道離寒庭神呪謹當吟詠夫學道修眞之士以慈悲一切而爲心積功累行之流以利濟萬彚而爲本毎演經科而救度常行運念以修崇用假法恩必希聖感謹當齋戒之辰爰命精修之侣建資崇之妙㑹設供養之香饈伏爲所薦幽魂未霑殊勝尚縈罪障難出苦輪念其受身爲兹設食仰惟九州社令五嶽靈官俯賜證明曲垂慈愍恭願遥瞻仙府上啓虚皇上帝大軫天恩曲垂憫念當啓乾坤之内廣邀今古以來是仗威光特伸關請召孤接引蕩形洒淨三皈切以幽途餓鬼長夜沉魂遍滿虚空遊行境土但吁嗟於邪道常憔悴於歉容復有積劫伏屍累年滯爽既昏明於旦暮常穢濁於形骸未超解脫之門尚絆湮沉之𩔖或襁褓相離父母或老耄永别子孫或居民在此膏肓或征客至兹淪䘮或負罪有遭王法或無常遽奄天年或縈纒疫癘而傾亡或凌犯雷霆而震怒或損害相謀性命或刎縊自䘮平生或山林虎狼傷殘或江海魚龍吞噬或男敵女娠而至死或蛇傷飲毒而殞亡或㘅冤久處於㝠途或枉死未離於鬼趣雖思奠酹冀遇餚羞心腹烟生喉嚨火發永抱饑窮之苦不逢飽飫之充空悲兎走鳥飛暗歷時遷嵗攺暌離井邑想骨肉以難㝷隔越烟波嘆胷襟而莫及皆屬里域所攝更無墳塜堪依明月茫茫愁雲漠漠一切孤魂無極滯魄未遂沖昇之路猶縈煩惱之心念六趣之輪廻悲四生之飛走永日而身遭籠縶終朝而膽懾網羅或戢翎歛翅於林巢或含齒披毛於土窟或帶角跨蹄於革澤或張鱗披甲於波潭頋鼎鑊則焉免其烹臨鋒鋩則豈逃斯慘悉是餘殃致此蓋由積惡使然當有一百二十冥曹八萬四千地府三官獄訟五嶽牢北都長夜之庭東嶽幽扄之府上尸中尸下尸三塗之界死道惡道邪道五苦之門次有鐵屋鐵山地獄鐵牛鐵馬地獄兩石壓身地獄八極八寒地獄斷絶分離地獄燋然脫落地獄如是諸大地獄等當來世世劫劫生生出死無門求生無路刀山險峻劒𣗳森羅食火吞烟不捨焦𤎅於曉夕飛戈飄㦸那堪痛楚於肌膚未離摙石之塗深苦負山之役蕩蕩愛河之上黒浪迷身沉沉苦海之中銀波溢目空感茫茫於豐蔀可悲寂寂於泉臺盡從過狂心以致此來報體特啓熏修之㑹爰伸供養之儀伏願至道垂慈髙眞開度俾令狴犴旁及河源咸獲感通仰承拯拔仗琅函之聖號宣瓊蔵之睿名未曽聞天尊者今皆得聞未遇天尊聖號者今皆得遇功力能超於鬼道薦修可陟於仙階各發皈依衆當諦聽大慈至廣天尊聖力無邊天尊能消惡趣天尊得契玄功天尊死魂受煉天尊仙道潜通天尊罪消北府天尊名上南宫天尊昭彰妙道天尊飛昇太空天尊恭惟聖力昭彰洪慈軫度遂使愛河苦海化作蓮池能命劒樹刀山翻成花圃冰池凛冽俄自消洋沸鑊烹煎遽皆撲滅賴玄元之殊造繄道德之良縁於是燈燭將然燦爛而照開地府況檀乍𤑔氤氲而騰布十方欲出重泉須憑大造饋其飲食獻以錢財伏覬四司六宫善簿惡籍三元九府隂宰陽官俯念有情廣施濟物上祈睿澤下布靈慈變一味爲百品之珍化一財爲千車之寳普及無窮之世界散霑無極之鬼魂仰希齊降形儀當歆祭享遂使虚膓頓實能令餒腹皆充各運身心速伸回向夙縁曩劫承資薦於眞風是夜今時味馨香於甘露宻灑慈悲之雨洗滌瑕疵廣吹解脫之風掃除罪累普生歡悅受福人天克遂感通仍歸遷適變食靈章謹當吟詠焚符變食呪食加持稱號道言戒者止也所以止人非心歸於正定故戒生定儒者亦謂知止而後有定但三洞衆經四輔祕典演說戒法種種不同惟無上洞玄靈寳九真妙戒者諸戒之首天人共仰幽顯同遵無上之上洞玄中玄萬神之靈一炁之寳妙貫三才戒制六情數定於陽故分爲九修而不僞故名爲真天人仰之以爲城郭幽顯資之以爲梯航今日亡魂受之可以爲之法藥然受戒之法靜黙爲先持戒之法勤奉爲上法衆同誠當傳九戒舉智慧頌第一戒者敬讓孝養父母是名初真戒受持之後當獲端正長壽果持心勿怠第二戒者克勤忠於君主是名念眞戒受持之後當獲聰明智慧果持心勿怠第三戒者不殺慈救衆生是名持眞戒受持之後當獲富貴豪勝果持心勿怠第四戒者不淫正身處物是名守真戒受持之後當獲吉慶安樂果持心勿怠第五戒者不盗推義損已是名保真戒受持之後當獲清淨善性果持心勿怠弟六戒者不嗔兇怒凌人是名修真戒受持之後當獲禄位清顯果持心勿怠第七戒者不驕傲忽至真是名得真戒受持之後當獲具足十相果持心勿怠弟八戒者不詐謟賊害善是名成真戒受持之後當獲大道正法果持心勿怠弟九戒者不二奉戒專一是名登真戒受持之後當獲證大法王果持心勿怠舉奉戒頌妙戒靈文黄籙白簡旣備宣於奥㫖當敬受於靈文夫心焉難制制以九戒則可歸心於太虚形也未超超以二符自可煉形於上境汝等孤魂直須生生勿志於戒言劫劫常持於符劵澄神物外塵縁永斷於多生受質陽間善果自臻於有永恩留家國慶及無窮所有長生寳籙功德䟽文謹當宣告祭煉切以啓祈將竟供養巳周延駐慮煩冥陽有隔今則晴云瀝瀝之銀河欲轉丁丁之銅漏將殘隂云黯黯之天扄牛斗沉沉之霧鎻蟾宫雨云寂寂之商羊鼔舞冥冥之石燕交飛雪云淅淅之暗粧玉樹紛紛之靜墜瑶階各整雲軿齊登霄漢天道即還天道神明各復神司人居三界之中鬼治九幽之府窮魂餓鬼地獄幽牢普願昇遷俱承利益變天厨之品餗化塵世之錢財悉爲祈恩無非致福領此香齋之㑹納兹俵獻之儀適皆次第而來今巳盤旋而去既得託形仙府必當髙歩祥雲逕朝靈應之宫遽詣逍遥之境上窮雲翼下極淵鱗獲奉善因仍聞妙樂溥承資薦共遂超升然冀飲食之餘供養之外曠野飛禽之𩔖悉可充腸深原走獸之徒盡皆飽腹儻值抨弦擊矢永脫侵傷若逢設網持戈更難損害早抛惡趣速證善縁畧伸及物之功稍罄信心之重叩頭星漢拜手天階法衆齋官謹伸奉送玉音仙樂響𤥆𤥆鶴舞鸞飛度九關執籙把符超法界參朝金闕覲天顔舉極樂頌送向來焚燎玉籙濟幽判斛儀
